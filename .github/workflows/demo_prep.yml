name: 🚀 Demo Prep — Generar mail y recap

on:
  workflow_dispatch:
    inputs:
      deal_id:
        description: "HubSpot Deal ID (used by frontend — leave empty to use filter)"
        required: false
        type: string
        default: ""

      filter_type:
        description: "Filter by owner or market (ignored if deal_id is set)"
        required: false
        type: choice
        options:
          - owner
          - market
        default: owner

      owner_id:
        description: "Owner name or ID (if filter_type = owner) — e.g. 'Fanny Haurot' or 86688154"
        required: false
        type: string
        default: ""

      market_value:
        description: "Market value (if filter_type = market) — e.g. France"
        required: false
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-demo-prep:
    name: "Analizar deal y generar mail"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependencias (uv para velocidad)
        run: pip install uv && uv pip install -r requirements.txt --system

      - name: ✅ Validar inputs
        run: |
          DEAL_ID="${{ github.event.inputs.deal_id }}"
          TYPE="${{ github.event.inputs.filter_type }}"
          if [ -n "$DEAL_ID" ]; then
            echo "✓ Processing deal ID: $DEAL_ID"
          elif [ "$TYPE" = "owner" ] && [ -z "${{ github.event.inputs.owner_id }}" ]; then
            echo "❌ ERROR: Owner ID required when filter_type is 'owner'."; exit 1
          elif [ "$TYPE" = "market" ] && [ -z "${{ github.event.inputs.market_value }}" ]; then
            echo "❌ ERROR: Market value required when filter_type is 'market'."; exit 1
          fi

      - name: 🚀 Ejecutar demo prep
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          SLACK_TOKEN:     ${{ secrets.SLACK_TOKEN }}
          SLACK_USER_ID:   ${{ secrets.SLACK_USER_ID }}
        run: |
          DEAL_ID="${{ github.event.inputs.deal_id }}"
          TYPE="${{ github.event.inputs.filter_type }}"
          if [ -n "$DEAL_ID" ]; then
            python main.py --deal-id "$DEAL_ID"
          elif [ "$TYPE" = "owner" ]; then
            python main.py --owner "${{ github.event.inputs.owner_id }}"
          else
            python main.py --market "${{ github.event.inputs.market_value }}"
          fi

      - name: ✅ Resultado
        if: success()
        run: echo "✅ Mail y recap enviados a Slack correctamente."

      - name: ❌ Error
        if: failure()
        run: echo "❌ Algo fue mal. Revisa los logs de arriba."
