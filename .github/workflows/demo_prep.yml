name: 🚀 Demo Prep — Generar mail y recap

on:
  workflow_dispatch:
    inputs:
      filter_type:
        description: "¿Filtrar por owner o por mercado? (Provenance = Partners Distribution siempre activo)"
        required: true
        type: choice
        options:
          - owner
          - market
        default: owner

      owner_id:
        description: "Owner ID (si elegiste 'owner') — ej: 86688154 para Fanny Haurot"
        required: false
        type: string
        default: ""

      market_value:
        description: "Mercado (si elegiste 'market') — ej: France, Spain, Italy"
        required: false
        type: string
        default: ""

      deal_selection:
        description: "¿Qué deal analizar?"
        required: true
        type: choice
        options:
          - "Próximo (first_meeting_at más cercano a hoy)"
        default: "Próximo (first_meeting_at más cercano a hoy)"

jobs:
  run-demo-prep:
    name: "Analizar deal y generar mail"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: ✅ Validar inputs
        run: |
          TYPE="${{ github.event.inputs.filter_type }}"
          if [ "$TYPE" = "owner" ] && [ -z "${{ github.event.inputs.owner_id }}" ]; then
            echo "❌ ERROR: Debes introducir un Owner ID cuando el filtro es 'owner'."; exit 1
          fi
          if [ "$TYPE" = "market" ] && [ -z "${{ github.event.inputs.market_value }}" ]; then
            echo "❌ ERROR: Debes introducir un valor de mercado cuando el filtro es 'market'."; exit 1
          fi

      - name: 🚀 Ejecutar demo prep
        env:
          HUBSPOT_API_KEY:          ${{ secrets.HUBSPOT_API_KEY }}
          AZURE_ANTHROPIC_ENDPOINT: ${{ secrets.AZURE_ANTHROPIC_ENDPOINT }}
          AZURE_ANTHROPIC_API_KEY:  ${{ secrets.AZURE_ANTHROPIC_API_KEY }}
          AZURE_ANTHROPIC_MODEL:    ${{ secrets.AZURE_ANTHROPIC_MODEL }}
          SLACK_TOKEN:              ${{ secrets.SLACK_TOKEN }}
          SLACK_USER_ID:            ${{ secrets.SLACK_USER_ID }}
        run: |
          TYPE="${{ github.event.inputs.filter_type }}"
          if [ "$TYPE" = "owner" ]; then
            python main.py --owner "${{ github.event.inputs.owner_id }}"
          else
            python main.py --market "${{ github.event.inputs.market_value }}"
          fi

      - name: ✅ Resultado
        if: success()
        run: echo "✅ Mail y recap enviados a Slack correctamente."

      - name: ❌ Error
        if: failure()
        run: echo "❌ Algo fue mal. Revisa los logs de arriba."
