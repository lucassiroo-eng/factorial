name: Discover Owners — actualizar owners.json

on:
  schedule:
    - cron: '0 6 * * 1'   # Cada lunes 06:00 UTC
  workflow_dispatch: {}    # Trigger manual

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  discover:
    name: "Scan deals → owners.json"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install uv && uv pip install -r requirements.txt --system

      - name: Descubrir owners
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: python main.py --discover-owners

      - name: Commit owners.json si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add owners.json
          if git diff --cached --quiet; then
            echo "No changes — owners.json already up to date."
          else
            git commit -m "chore: update owners.json [skip ci]"
            git push
          fi
