name: Backfill Partner Calls (6 months)

on:
  workflow_dispatch:

jobs:
  jan-2026:
    name: "January 2026"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Backfill Jan 2026
        env:
          MODJO_API_KEY: ${{ secrets.MODJO_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python backfill_partner_calls.py 2026 1

  feb-2026:
