name: Nightly Partner Pipeline

on:
  schedule:
    - cron: "0 23 * * *"  # 1am CEST
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "sync"
        type: choice
        options:
          - sync
          - backfill
      year:
        description: "Backfill year"
        required: false
        default: "2026"
      month:
        description: "Backfill month (1-12)"
        required: false
        default: "5"
      skip_enrich:
        description: "Skip enrichment after sync"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Modjo 991 calls
        env:
          MODJO_API_KEY: ${{ secrets.MODJO_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ inputs.mode }}" = "backfill" ]; then
            python sync_modjo_calls.py backfill ${{ inputs.year }} ${{ inputs.month }}
          else
            python sync_modjo_calls.py
          fi

      - name: Enrich new partners with Claude
        if: inputs.skip_enrich != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_FOUNDRY_BASE_URL: ${{ secrets.ANTHROPIC_FOUNDRY_BASE_URL }}
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
        run: python enrich_partner_board.py
