name: Auto Demo Prep — France (diario)

# Lunes-jueves: demos del día siguiente
# Viernes: demos del lunes (--next-business-day lo calcula solo)
# Sábado y domingo: no corre

on:
  schedule:
    - cron: '0 7 * * 1-5'   # Lun-Vie 07:00 UTC = 08:00/09:00 París
  workflow_dispatch: {}      # Trigger manual para testear

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-france-prep:
    name: "France — demos del día siguiente"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install uv && uv pip install -r requirements.txt --system

      - name: Ejecutar prep France
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          AZURE_CONFIG: ${{ secrets.AZURE_CONFIG }}
          SLACK_TOKEN:     ${{ secrets.SLACK_TOKEN }}
          SLACK_USER_ID:   ${{ secrets.SLACK_USER_ID }}
          AE_NAME:         ${{ secrets.AE_NAME }}
          AE_EMAIL:        ${{ secrets.AE_EMAIL }}
        run: python main.py --market France --all --next-business-day --send-to-me

      - name: OK
        if: success()
        run: echo "✅ Mails France enviados a cada AE."

      - name: Error
        if: failure()
        run: echo "❌ Algo fue mal. Revisa los logs."
