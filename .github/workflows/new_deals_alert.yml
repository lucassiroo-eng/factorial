name: New Deals Alert (hors-France)

on:
  schedule:
    - cron: "0 6 * * *"  # 8am CEST (6am UTC)
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), default = yesterday"
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Notify new deals to Slack
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_API_KEY }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python notify_new_deals.py "${{ github.event.inputs.date }}"
          else
            python notify_new_deals.py
          fi
